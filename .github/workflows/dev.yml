name: Report Management(Development)

on:
  push:
    branches:
      - dev

env:
  DOCKER_IMAGE: 923083696216.dkr.ecr.us-east-1.amazonaws.com/user-management-service
  ECR_REGISTRY: 923083696216.dkr.ecr.us-east-1.amazonaws.com

jobs:
  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to ECR
        id: ecr
        uses: jwalton/gh-ecr-login@v3
        with:
          access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          region: us-east-1

      - name: Build Docker Image
        run: |
          docker build -t $DOCKER_IMAGE:${{ github.run_number }} .

      - name: Tag and Push to ECR
        run: |
          docker tag 923083696216.dkr.ecr.us-east-1.amazonaws.com/user-management-service:${{ github.run_number }} $DOCKER_IMAGE:latest
          docker push 923083696216.dkr.ecr.us-east-1.amazonaws.com/user-management-service:${{ github.run_number }}
          docker push 923083696216.dkr.ecr.us-east-1.amazonaws.com/user-management-service:latest

  deploy:
    name: Deploy to EC2
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: SSH and Deploy on EC2
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > private_key.pem
          chmod 600 private_key.pem
          ssh -o StrictHostKeyChecking=no -i private_key.pem ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << EOF
            
            aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 923083696216.dkr.ecr.us-east-1.amazonaws.com
            
            docker rm -f report-backend || true

            docker pull 923083696216.dkr.ecr.us-east-1.amazonaws.com/user-management-service:${{ github.run_number }}
            
            docker run -d \
              -p 3492:3492 \
              --network host \
              --name report-backend \
              -e DB_NAME=${{ secrets.DB_NAME_ }} \
              -e DB_USERNAME=${{ secrets.DB_USERNAME }} \
              -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
              -e DB_HOST=localhost \
              -e DB_PORT=${{ secrets.DB_PORT }} \
              -e DEBUG=${{ secrets.DEBUG }} \
              923083696216.dkr.ecr.us-east-1.amazonaws.com/user-management-service:${{ github.run_number }}
          EOF